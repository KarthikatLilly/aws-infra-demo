# _deploy-stack.yml — Reusable workflow: deploy a single CloudFormation stack
#
# Call this workflow from deploy.yml for each stack in sequence.
# The caller passes the stack name, template path, parameter file path,
# AWS region, and the target GitHub environment.

name: Deploy Stack (reusable)

on:
  workflow_call:
    inputs:
      stack-name:
        description: Name of the CloudFormation stack.
        required: true
        type: string
      template-file:
        description: Relative path to the CloudFormation template (from repo root).
        required: true
        type: string
      parameter-file:
        description: Relative path to the JSON parameter file (from repo root).
        required: true
        type: string
      aws-region:
        description: AWS region to deploy into.
        required: false
        type: string
        default: us-east-1
      environment:
        description: GitHub environment name (dev, qa, prod).
        required: true
        type: string

jobs:
  deploy:
    name: Deploy ${{ inputs.stack-name }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    permissions:
      id-token: write   # required for OIDC token exchange
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ inputs.aws-region }}
          # Role session name helps identify deployments in CloudTrail
          role-session-name: gha-${{ inputs.stack-name }}-${{ github.run_id }}

      - name: Deploy ${{ inputs.stack-name }}
        run: |
          aws cloudformation deploy \
            --stack-name "${{ inputs.stack-name }}" \
            --template-file "${{ inputs.template-file }}" \
            --parameter-overrides "file://${{ inputs.parameter-file }}" \
            --capabilities CAPABILITY_NAMED_IAM \
            --no-fail-on-empty-changeset \
            --region "${{ inputs.aws-region }}"

      - name: Show stack outputs
        if: always()
        run: |
          aws cloudformation describe-stacks \
            --stack-name "${{ inputs.stack-name }}" \
            --region "${{ inputs.aws-region }}" \
            --query "Stacks[0].Outputs" \
            --output table || true
