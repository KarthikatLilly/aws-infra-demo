# =============================================================================
# api-gateway.yml — StatusPulse HTTP API (API Gateway v2)
#
# Purpose : Creates an HTTP API with two routes:
#             GET  /health  → mock integration (returns 200 OK immediately)
#             POST /events  → AWS service integration → SQS SendMessage
#           The SQS integration uses a caller-supplied IAM role (no Lambda
#           needed), keeping the stack lightweight.
#
# Inputs  : ApiBaseName, StageName, ThrottlingBurstLimit,
#           ThrottlingRateLimit, CorsAllowOrigins,
#           MainQueueUrl, MainQueueArn, ApiGatewayRoleArn
#
# Outputs : HttpApiId, InvokeUrl
# =============================================================================

AWSTemplateFormatVersion: "2010-09-09"
Description: >
  StatusPulse – HTTP API Gateway v2
  GET /health → mock
  POST /events → SQS integration

Parameters:
  ApiBaseName:
    Type: String
    Default: statuspulse-api-dev

  StageName:
    Type: String
    Default: dev

  ThrottlingBurstLimit:
    Type: Number
    Default: 50

  ThrottlingRateLimit:
    Type: Number
    Default: 25

  CorsAllowOrigins:
    Type: String
    Default: "*"

  MainQueueUrl:
    Type: String

  ApiGatewayRoleArn:
    Type: String

Resources:

  # HTTP API
  StatusPulseHttpApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Ref ApiBaseName
      ProtocolType: HTTP
      CorsConfiguration:
        AllowOrigins: !Split [",", !Ref CorsAllowOrigins]
        AllowMethods: [GET, POST, OPTIONS]
        AllowHeaders: [Content-Type, Authorization, X-Amz-Date, X-Api-Key]

  # HEALTH CHECK
  HealthIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref StatusPulseHttpApi
      IntegrationType: MOCK
      PayloadFormatVersion: "1.0"
      RequestTemplates:
        "200": '{"statusCode":200}'

  HealthRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref StatusPulseHttpApi
      RouteKey: "GET /health"
      Target: !Sub "integrations/${HealthIntegration}"

  # 🚨 FIXED SQS INTEGRATION (NON‑PROXY, SAFE)
  EventsIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref StatusPulseHttpApi
      IntegrationType: AWS
      IntegrationUri: !Sub >-
        arn:aws:apigateway:${AWS::Region}:sqs:path/${AWS::AccountId}/statuspulse-events-dev.fifo
      CredentialsArn: !Ref ApiGatewayRoleArn
      PayloadFormatVersion: "1.0"
      RequestParameters:
        "integration.request.header.Content-Type": "'application/x-www-form-urlencoded'"
      RequestTemplates:
        "application/json": !Sub |
          Action=SendMessage
          &MessageBody=$util.urlEncode($input.body)
          &MessageGroupId=default

  EventsRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref StatusPulseHttpApi
      RouteKey: "POST /events"
      Target: !Sub "integrations/${EventsIntegration}"

  # Stage
  StatusPulseStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref StatusPulseHttpApi
      StageName: !Ref StageName
      AutoDeploy: true
      DefaultRouteSettings:
        ThrottlingBurstLimit: !Ref ThrottlingBurstLimit
        ThrottlingRateLimit: !Ref ThrottlingRateLimit

Outputs:
  InvokeUrl:
    Value: !Sub "https://${StatusPulseHttpApi}.execute-api.${AWS::Region}.amazonaws.com/${StageName}"